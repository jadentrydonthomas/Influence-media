name: Deploy to GitHub Pages

# Publishes the site whenever you push to these branches.
on:
  push:
    branches:
      - main
      - claude/vibrant-heisenberg-9bcj9d
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one deployment at a time.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          # The whole repo root is the site (index.html lives here).
          path: "."

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
