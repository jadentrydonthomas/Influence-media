# One-click deploy on Render (free/starter): New → Blueprint → point at this repo.
services:
  - type: web
    name: trydon
    runtime: node
    rootDir: trydon
    buildCommand: "true"
    startCommand: node server.js
    plan: starter
    disk:
      name: trydon-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: TRYDON_DATA_DIR
        value: /var/data
      - key: TRYDON_TZ
        value: America/Chicago
      - key: TRYDON_BRIEFING_TIME
        value: "06:30"
      - key: TRYDON_ACCESS_CODE
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
